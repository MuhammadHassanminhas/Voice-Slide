<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="VoiceSlide — NLP-powered presentation viewer with voice navigation, live highlighting, and analytics." />
  <title>VoiceSlide — Presentation</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- reveal.js core CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.css" />

  <!-- VoiceSlide custom styles (loaded AFTER reveal so we can override) -->
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/presentation.css" />
</head>

<body>

  <!-- ── Quick Navigation (Presenter & Analytics) ────────────────── -->
  <nav class="nav-fab" id="nav-fab">
    <a href="/presenter" target="_blank" class="nav-fab__btn" title="Presenter Panel">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg>
      <span>Presenter</span>
    </a>
    <a href="/analytics" target="_blank" class="nav-fab__btn" title="Analytics Dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
      <span>Analytics</span>
    </a>
  </nav>

  <!-- ── Presentation Container ─────────────────────────────────── -->
  <div class="reveal" id="reveal-container">
    <div class="slides" id="slides-container">
      <!-- Dynamically populated from /api/slides -->
    </div>
  </div>

  <!-- ── No-slides Fallback ─────────────────────────────────────── -->
  <div id="no-slides-message" class="no-slides" style="display:none;">
    <div class="no-slides__icon">📑</div>
    <h2 class="no-slides__title">No Slides Loaded</h2>
    <p class="no-slides__text">
      Upload a <strong>.pptx</strong> file, paste JSON, or use the web editor to get started.
    </p>
    <a href="/upload" class="btn-primary" style="margin-top: 24px; text-decoration: none;">Import Slides</a>
  </div>

  <!-- ── Voice Control & Transcript (Phase 3+) ──────────────────── -->
  <button id="mic-toggle-btn" class="mic-toggle-btn" aria-label="Toggle Microphone">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mic">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
      <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
      <line x1="12" x2="12" y1="19" y2="22" />
    </svg>
  </button>

  <div id="transcript-bar" class="transcript-bar">
    <div class="transcript-content">
      <span class="transcript-indicator"></span>
      <p id="transcript-text" class="transcript-text"></p>
    </div>
  </div>

  <!-- ── Toast Notification ─────────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── Scripts ────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
